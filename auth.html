<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WildHeavy | Open in App</title>
    <meta name="description" content="Open WildHeavy in the app to continue.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #ffffff;
            --text-forest: #1a3d2e;
            --text-slate: #2d5a45;
            --border-light: rgba(26, 61, 46, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-cream);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-forest);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding: 24px;
            text-align: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            border-radius: 24px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-forest);
            margin-bottom: 12px;
        }

        p {
            color: var(--text-slate);
            font-size: 16px;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: var(--text-forest);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .secondary-link {
            display: block;
            margin-top: 16px;
            color: var(--text-slate);
            font-size: 14px;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/favicon.png" alt="WildHeavy" class="logo">
        <h1>Open WildHeavy</h1>
        <p>Tap the button below to continue in the app. If you don't have it yet, join our TestFlight to get started.</p>
        <a href="https://testflight.apple.com/join/UUrFyauF" class="btn" id="ctaButton">Get WildHeavy on TestFlight</a>
        <a href="/" class="secondary-link">Visit wildheavy.com</a>
    </div>
</body>
</html>
